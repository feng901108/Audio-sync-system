<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>聚光广播 · 管理</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body class="admin-page admin-compact">

  <!-- login -->
  <section id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-mark">Juguang</div>
        <h1 class="login-brand-title">聚光广播 · 管理</h1>
      </div>
      <form id="login-form" class="login-form" autocomplete="on">
        <div class="field">
          <input id="username" class="input" placeholder="用户名" autocomplete="username" />
        </div>
        <div class="field">
          <input id="password" class="input" type="password" placeholder="密码" autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary" style="height:48px;font-size:15px;margin-top:var(--sp-2);">登录</button>
      </form>
      <p id="login-err" class="login-error"></p>
      <p class="login-hint">
        首次使用请在服务器执行<br />
        <code>node server/init-admin.mjs admin your_password</code>
      </p>
    </div>
  </section>

  <!-- dashboard: 四象限布局 -->
  <main id="dashboard" class="dashboard-compact" hidden>

    <!-- 顶栏：标题 + 登出（模式切换已移到右上播放器） -->
    <header class="topbar-compact">
      <div class="topbar-left">
        <h1 class="topbar-title">聚光广播</h1>
        <span class="topbar-who" id="who"></span>
      </div>
      <div class="topbar-actions">
        <button id="logout-btn" class="btn btn-ghost">登出</button>
      </div>
    </header>

    <!-- 2x2 grid：左上管理 / 右上播放器 / 左下曲库 / 右下队列 -->
    <div class="layout-grid">

      <!-- 左上：设备 / 歌单 / 分区 管理（渐变背景） -->
      <section class="quad quad-manage">
        <nav class="manage-tabs" role="tablist" aria-label="管理">
          <button class="manage-tab active" data-mtab="devices">设备</button>
          <button class="manage-tab" data-mtab="playlists">歌单</button>
          <button class="manage-tab" data-mtab="zones">分区</button>
        </nav>

        <!-- 设备：分活跃 / 历史两段（活跃是当前 WS 在线；历史是曾经连过但现在离线的，可删除） -->
        <div id="view-devices" class="manage-panel">
          <header class="panel-head">
            <h3 class="panel-title-sm">设备</h3>
            <span class="muted" id="device-count" style="font-size:11px;"></span>
          </header>
          <div class="device-section-label">活跃 <span id="device-active-count" class="muted"></span></div>
          <ul id="device-list-active" class="list list-compact"></ul>
          <details id="device-history-details" class="device-history">
            <summary class="device-section-label">历史 <span id="device-history-count" class="muted"></span></summary>
            <ul id="device-list-history" class="list list-compact"></ul>
          </details>
        </div>

        <!-- 歌单：列表 / 详情 两级 -->
        <div id="view-playlists" class="manage-panel" hidden>
          <div id="playlists-list-view">
            <form id="playlist-create-form" class="upload" style="margin-bottom:var(--sp-2);">
              <div class="field" style="flex-direction:row;gap:var(--sp-2);align-items:center;">
                <input id="playlist-new-name" class="input" placeholder="新歌单名称" maxlength="32" style="flex:1;" />
                <button type="submit" class="btn btn-primary" style="height:40px;">创建</button>
              </div>
            </form>
            <div id="playlists-list"></div>
            <p id="playlists-err" class="modal-error"></p>
          </div>
          <div id="playlists-detail-view" hidden>
            <div class="playlist-detail-head">
              <div>
                <h4 class="playlist-detail-name" id="pl-detail-name"></h4>
                <div class="playlist-detail-sub" id="pl-detail-sub"></div>
              </div>
              <div style="display:flex;gap:var(--sp-2);">
                <button id="pl-load-btn" class="btn btn-primary" style="height:36px;font-size:13px;" title="替换当前分区队列并播放">载入队列</button>
                <button id="pl-back-btn" class="btn btn-ghost" style="height:36px;font-size:13px;">返回</button>
              </div>
            </div>
            <div id="pl-tracks-list" style="margin-top:var(--sp-3);"></div>
          </div>
        </div>

        <!-- 分区：切换 + 改名 + 删除 + 新建（inline，不再弹窗） -->
        <div id="view-zones" class="manage-panel" hidden>
          <header class="panel-head">
            <h3 class="panel-title-sm">分区</h3>
            <button id="zone-add-btn" class="btn btn-ghost btn-tiny" title="新建分区">+ 新建</button>
          </header>
          <ul id="zones-list" class="list list-compact"></ul>
        </div>
      </section>

      <!-- 右上：播放器（标题 / 进度条 / 模式 / 全套控件） -->
      <section class="quad quad-player panel-now">
        <div class="now-panel-eyebrow">
          <span class="muted">正在播放 · </span>
          <span id="zone-label">—</span>
        </div>
        <h2 class="now-panel-title" id="now-title">空闲</h2>
        <p class="now-panel-artist" id="now-artist"></p>
        <div class="now-panel-meta">
          <div class="seek-row">
            <span class="mono-sm" id="now-pos">0:00</span>
            <input type="range" id="seek-bar" min="0" max="0" value="0" step="100" aria-label="进度" />
            <span class="muted mono-sm" id="now-dur">0:00</span>
          </div>
          <span><span class="muted">状态 </span><span id="now-state">—</span></span>
        </div>
        <div id="mode-switch" class="mode-switch" role="radiogroup" aria-label="播放模式">
          <button class="mode-switch-btn" data-mode="sequential" title="顺序播放"><span class="ico">⇢</span><span>顺序</span></button>
          <button class="mode-switch-btn" data-mode="loop-one" title="单曲循环"><span class="ico">↻</span><span>单曲</span></button>
          <button class="mode-switch-btn" data-mode="shuffle" title="随机播放"><span class="ico">🔀</span><span>随机</span></button>
          <button class="mode-switch-btn" data-mode="loop-all" title="歌单循环"><span class="ico">⟲</span><span>循环</span></button>
        </div>
        <div class="now-panel-controls">
          <button id="btn-prev" class="btn btn-icon" aria-label="上一首" title="上一首">⏮</button>
          <button id="btn-back" class="btn btn-icon" aria-label="快退10秒" title="快退 10s">⏪</button>
          <button id="btn-pause" class="btn btn-icon" aria-label="暂停" title="暂停">⏸</button>
          <button id="btn-resume" class="btn btn-icon" aria-label="继续" title="继续">▶</button>
          <button id="btn-next" class="btn btn-icon" aria-label="下一首" title="下一首">⏭</button>
          <button id="btn-fwd" class="btn btn-icon" aria-label="快进10秒" title="快进 10s">⏩</button>
          <button id="btn-stop" class="btn btn-icon" aria-label="停止" title="停止">⏹</button>
        </div>
      </section>

      <!-- 左下：上传 + 曲库 -->
      <section class="quad quad-library">
        <header class="panel-head">
          <h2 class="panel-title">
            <span>曲库</span>
            <span class="muted" style="font-weight:400;font-size:13px;">全局共享</span>
          </h2>
        </header>
        <form id="upload-form" class="upload-compact">
          <label class="upload-drop-compact" id="upload-drop">
            <input id="upload-file" type="file" accept="audio/*" multiple />
            <span class="upload-drop-text">
              <strong>点击或拖入文件</strong>
              <span class="muted">支持多选 · MP3 / M4A / AAC / OGG / WAV / FLAC</span>
            </span>
          </label>
          <div class="upload-progress" id="upload-progress">
            <div class="upload-progress-fill" id="upload-progress-fill"></div>
          </div>
          <p id="upload-status" class="upload-status muted"></p>
        </form>
        <ul id="track-list" class="list list-compact"></ul>
      </section>

      <!-- 右下：播放队列（当前歌单） -->
      <section class="quad quad-queue">
        <header class="panel-head">
          <h3 class="panel-title-sm">播放队列 <span class="muted" style="font-weight:400;font-size:11px;text-transform:none;letter-spacing:0;">（可拖拽排序）</span></h3>
          <button id="clear-queue" class="btn btn-ghost" style="height:28px;font-size:12px;padding:0 10px;">清空</button>
        </header>
        <ul id="queue-list" class="list list-compact queue-draggable"></ul>
      </section>

    </div>
  </main>

  <!-- 「加入歌单」选择 弹窗 -->
  <div id="picker-modal" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-labelledby="picker-modal-title" style="width:420px;">
      <div class="modal-head">
        <h3 id="picker-modal-title" class="modal-title">加入歌单</h3>
        <button id="picker-close" class="icon-btn" aria-label="关闭">×</button>
      </div>
      <div id="picker-list"></div>
      <form id="picker-create-form" class="upload" style="margin-top:var(--sp-3);">
        <div class="field" style="flex-direction:row;gap:var(--sp-2);align-items:center;">
          <input id="picker-new-name" class="input" placeholder="或新建一个歌单…" maxlength="32" style="flex:1;" />
          <button type="submit" class="btn btn-primary" style="height:48px;">+</button>
        </div>
      </form>
      <p id="picker-err" class="modal-error"></p>
    </div>
  </div>

  <!-- 曲目编辑 弹窗 -->
  <div id="track-edit-modal" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-labelledby="track-edit-modal-title" style="width:420px;">
      <div class="modal-head">
        <h3 id="track-edit-modal-title" class="modal-title">编辑曲目</h3>
        <button id="track-edit-close" class="icon-btn" aria-label="关闭">×</button>
      </div>
      <form id="track-edit-form" style="display:flex;flex-direction:column;gap:var(--sp-3);">
        <div class="field">
          <label class="muted" style="font-size:12px;">标题</label>
          <input id="track-edit-title" class="input" maxlength="200" />
        </div>
        <div class="field">
          <label class="muted" style="font-size:12px;">艺人</label>
          <input id="track-edit-artist" class="input" maxlength="200" placeholder="（留空表示未知）" />
        </div>
        <p id="track-edit-meta" class="muted" style="font-size:11.5px;margin:0;"></p>
        <div style="display:flex;gap:var(--sp-2);">
          <button type="submit" class="btn btn-primary" style="flex:1;height:44px;">保存</button>
          <button type="button" id="track-edit-cancel" class="btn btn-ghost" style="height:44px;">取消</button>
        </div>
      </form>
      <p id="track-edit-err" class="modal-error"></p>
    </div>
  </div>

<script type="module">
const $ = (id) => document.getElementById(id);

async function api(path, init = {}) {
  const headers = { ...(init.headers || {}) };
  let body = init.body;
  if (init.json !== undefined) { headers["Content-Type"] = "application/json"; body = JSON.stringify(init.json); }
  const r = await fetch(path, { ...init, headers, body, credentials: "include" });
  if (!r.ok) {
    let msg = `HTTP ${r.status}`;
    try { const j = await r.json(); if (j?.error) msg = j.error; } catch {}
    throw new Error(msg);
  }
  return await r.json();
}

let tracks = [];
let zones = [];
let playlists = [];
let currentZoneId = null;
let currentZoneName = "";
let currentMode = "sequential";
let currentManageTab = "devices";
let seekDragging = false;
let volumeDragging = false;

function fmtTime(ms) {
  const s = Math.max(0, Math.floor(ms / 1000));
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${m}:${r < 10 ? "0" : ""}${r}`;
}

// 左上管理 tab 切换：设备 / 歌单 / 分区
function switchManageTab(name) {
  currentManageTab = name;
  $("view-devices").hidden = (name !== "devices");
  $("view-playlists").hidden = (name !== "playlists");
  $("view-zones").hidden = (name !== "zones");
  for (const b of document.querySelectorAll(".manage-tabs .manage-tab")) {
    b.classList.toggle("active", b.dataset.mtab === name);
  }
  if (name === "playlists") {
    $("playlists-detail-view").hidden = true;
    $("playlists-list-view").hidden = false;
    $("playlists-err").textContent = "";
    $("playlist-new-name").value = "";
    refreshPlaylists().then(renderPlaylistsList);
  } else if (name === "zones") {
    renderZonesList();
  } else if (name === "devices") {
    refreshZoneDevices();
  }
}

// 分区 inline 列表（切换 + 改名 + 删除）
function renderZonesList() {
  const ul = $("zones-list");
  ul.innerHTML = "";
  for (const z of zones) {
    const li = document.createElement("li");
    li.className = "list-item list-item-compact" + (z.id === currentZoneId ? " zone-current" : "");
    li.innerHTML = `
      <div class="list-item-main">
        <div class="list-item-title"></div>
        <div class="list-item-sub">#${z.id} · ${z.builtin ? "默认" : "可管理"}</div>
      </div>
      <div class="list-item-actions">
        <button class="icon-btn" data-act="rename" aria-label="改名" title="改名">✎</button>
        <button class="icon-btn danger" data-act="del" ${z.builtin ? "disabled" : ""} aria-label="删除" title="删除">✕</button>
      </div>`;
    li.querySelector(".list-item-title").textContent = z.name + (z.id === currentZoneId ? " · 当前" : "");
    li.querySelector(".list-item-main").onclick = () => switchZone(z.id);
    li.querySelector('[data-act="rename"]').onclick = async (ev) => {
      ev.stopPropagation();
      const name = prompt("新名字", z.name);
      if (!name) return;
      try { await api(`/api/zones/${z.id}`, { method: "PATCH", json: { name } }); }
      catch (e) { alert(e.message); return; }
      await refreshZones();
    };
    li.querySelector('[data-act="del"]').onclick = async (ev) => {
      ev.stopPropagation();
      if (z.builtin) return;
      if (!confirm(`删除分区「${z.name}」？该分区的设备将变为"未分区"。`)) return;
      try { await api(`/api/zones/${z.id}`, { method: "DELETE" }); }
      catch (e) { alert(e.message); return; }
      await refreshZones();
    };
    ul.appendChild(li);
  }
}

async function refreshZones() {
  const r = await api("/api/zones");
  zones = r.zones;
  if (currentZoneId == null) {
    if (zones.length > 0) switchZone(zones[0].id);
  } else if (!zones.find((z) => z.id === currentZoneId)) {
    switchZone(zones[0]?.id ?? null);
  } else {
    renderZonesList();
    if (currentManageTab === "devices") refreshZoneDevices(); // 分区名变了，刷新设备下拉
  }
}

function switchZone(zoneId) {
  currentZoneId = zoneId;
  const z = zones.find((x) => x.id === zoneId);
  currentZoneName = z?.name ?? "";
  $("zone-label").textContent = currentZoneName || "—";
  renderZonesList();
  refreshPlayback();
}

async function refreshTracks() {
  const r = await api("/api/tracks");
  tracks = r.tracks;
  const ul = $("track-list");
  ul.innerHTML = "";
  if (tracks.length === 0) {
    ul.innerHTML = '<li class="list-empty">曲库为空，从上方上传你的第一首曲目</li>';
    return;
  }
  for (const t of tracks) {
    const li = document.createElement("li");
    li.className = "list-item list-item-compact";
    li.innerHTML = `
      <div class="list-item-main">
        <div class="list-item-title"></div>
        <div class="list-item-sub"></div>
      </div>
      <div class="list-item-actions">
        <span class="muted mono-sm">${Math.round(t.duration_ms / 1000)}s</span>
        <button class="icon-btn primary" data-act="play" aria-label="播放" title="播放">▶</button>
        <button class="icon-btn" data-act="enqueue" aria-label="加入队列" title="加入队列">+</button>
        <button class="icon-btn" data-act="add-to-pl" aria-label="加入歌单" title="加入歌单">♡</button>
        <button class="icon-btn" data-act="edit" aria-label="编辑元数据" title="编辑标题 / 艺人">✎</button>
        <button class="icon-btn danger" data-act="del" aria-label="删除" title="删除">✕</button>
      </div>`;
    li.querySelector(".list-item-title").textContent = t.title;
    li.querySelector(".list-item-sub").textContent = t.artist ?? t.id.slice(0, 8);
    const zonePath = currentZoneId ? `/api/zones/${currentZoneId}` : "/api/zones/1";
    li.querySelector('[data-act="play"]').onclick = async () => {
      await api(`${zonePath}/playback/play`, { method: "POST", json: { trackId: t.id } });
      refreshPlayback();
    };
    li.querySelector('[data-act="enqueue"]').onclick = async () => {
      await api(`${zonePath}/queue/enqueue`, { method: "POST", json: { trackIds: [t.id] } });
      refreshPlayback();
    };
    li.querySelector('[data-act="add-to-pl"]').onclick = () => openAddToPlaylistPicker(t.id);
    li.querySelector('[data-act="edit"]').onclick = () => openTrackEdit(t.id);
    li.querySelector('[data-act="del"]').onclick = async () => {
      if (!confirm(`删除「${t.title}」？`)) return;
      await api(`/api/tracks/${t.id}`, { method: "DELETE" });
      await refreshTracks();
    };
    ul.appendChild(li);
  }
}

// 设备分两段渲染：活跃（WS 在线）/ 历史（曾连过但离线，可删除）
async function refreshZoneDevices() {
  const r = await api("/api/devices");
  const active = r.devices.filter((d) => d.online);
  const history = r.devices.filter((d) => !d.online);
  $("device-count").textContent = `${r.devices.length} 台`;
  $("device-active-count").textContent = `${active.length}`;
  $("device-history-count").textContent = `${history.length}`;
  // 历史段无设备时折叠 details，避免占空间
  $("device-history-details").open = history.length > 0;

  const renderRow = (d, isHistory) => {
    const li = document.createElement("li");
    li.className = "list-item list-item-compact" + (isHistory ? " list-item-history" : "");
    const zoneOpts = `<option value="" ${d.zone_id == null ? "selected" : ""}>未分区</option>`
      + zones.map((z) => `<option value="${z.id}" ${d.zone_id == z.id ? "selected" : ""}>${z.name}</option>`).join("");
    const ago = fmtAgo(Number(d.last_seen_at));
    li.innerHTML = `
      <div class="list-item-main">
        <div class="list-item-title"><span class="dot ${d.online ? "ok" : ""}"></span><span class="dname"></span></div>
        <div class="list-item-sub">${d.kind} · ${d.id.slice(0, 6)}${d.ip ? " · " + d.ip : ""}${isHistory ? " · " + ago : ""}</div>
      </div>
      <div class="list-item-actions">
        <select class="device-zone-sel" aria-label="分配分区" title="分配分区">${zoneOpts}</select>
        <input type="range" min="0" max="1" step="0.01" value="${d.volume}" style="width:56px;" aria-label="音量" />
        <span class="muted mono-sm">${Math.round(d.volume * 100)}%</span>
        <button class="icon-btn danger dev-del-btn" title="删除${isHistory ? "历史记录" : "并断开连接"}" aria-label="删除设备">✕</button>
      </div>`;
    li.querySelector(".dname").textContent = d.name;
    const sel = li.querySelector("select");
    sel.onchange = async () => {
      const zid = sel.value === "" ? null : Number(sel.value);
      try { await api(`/api/devices/${d.id}`, { method: "PATCH", json: { zoneId: zid } }); }
      catch (e) { alert(e.message); }
      refreshZoneDevices();
    };
    const range = li.querySelector("input");
    const valEl = li.querySelector(".muted");
    range.oninput = () => { volumeDragging = true; valEl.textContent = `${Math.round(Number(range.value) * 100)}%`; };
    range.onchange = async () => {
      try { await api(`/api/devices/${d.id}`, { method: "PATCH", json: { volume: Number(range.value) } }); }
      catch (e) { alert(e.message); }
      volumeDragging = false;
    };
    li.querySelector(".dev-del-btn").onclick = async () => {
      if (!confirm(`删除设备 "${d.name}"？${isHistory ? "" : "（设备在线，将被断开）"}`)) return;
      try { await api(`/api/devices/${d.id}`, { method: "DELETE" }); }
      catch (e) { alert(e.message); return; }
      refreshZoneDevices();
    };
    return li;
  };

  const ulA = $("device-list-active");
  ulA.innerHTML = "";
  if (active.length === 0) {
    ulA.innerHTML = '<li class="list-empty">暂无活跃设备</li>';
  } else {
    for (const d of active) ulA.appendChild(renderRow(d, false));
  }
  const ulH = $("device-list-history");
  ulH.innerHTML = "";
  if (history.length === 0) {
    ulH.innerHTML = '<li class="list-empty muted">无历史设备</li>';
  } else {
    for (const d of history) ulH.appendChild(renderRow(d, true));
  }
}

// 相对时间（"刚刚 / 5 分钟前 / 2 小时前 / 昨天 / 3 天前"）
function fmtAgo(ms) {
  const diff = Date.now() - ms;
  if (diff < 60_000) return "刚刚";
  if (diff < 3_600_000) return `${Math.floor(diff / 60_000)} 分钟前`;
  if (diff < 86_400_000) return `${Math.floor(diff / 3_600_000)} 小时前`;
  if (diff < 172_800_000) return "昨天";
  return `${Math.floor(diff / 86_400_000)} 天前`;
}

async function refreshPlayback() {
  if (currentZoneId == null) return;
  const s = await api(`/api/zones/${currentZoneId}/snapshot`);
  $("now-title").textContent = s.track?.title ?? "空闲";
  $("now-artist").textContent = s.track?.artist ?? "";
  const pos = s.isPlaying && s.startServerTime
    ? s.trackOffsetMs + (s.serverTime - s.startServerTime)
    : s.trackOffsetMs;
  const dur = s.track?.durationMs || 0;
  $("seek-bar").max = String(dur);
  $("now-dur").textContent = fmtTime(dur);
  if (!seekDragging) {
    $("seek-bar").value = String(Math.max(0, Math.min(dur, Math.round(pos))));
    $("now-pos").textContent = fmtTime(pos);
  }
  $("now-state").textContent = s.isPlaying ? "播放中" : s.track ? "已暂停" : "空闲";

  if (s.mode && s.mode !== currentMode) {
    currentMode = s.mode;
    renderModeSwitch();
  }

  const ql = $("queue-list");
  ql.innerHTML = "";
  if (s.queue.length === 0) {
    ql.innerHTML = '<li class="list-empty">队列为空</li>';
  } else {
    s.queue.forEach((tid, idx) => {
      const t = tracks.find((x) => x.id === tid);
      const li = document.createElement("li");
      li.className = "list-item list-item-compact queue-item";
      li.draggable = true;
      li.dataset.trackId = tid;
      li.innerHTML = `
        <span class="drag-handle" aria-hidden="true">≡</span>
        <div class="list-item-main"><div class="list-item-sub">${idx + 1}. <span></span></div></div>`;
      li.querySelector("span:last-child").textContent = t ? t.title : tid;
      ql.appendChild(li);
    });
    bindQueueDrag();
  }
}

function renderModeSwitch() {
  for (const b of document.querySelectorAll("#mode-switch .mode-switch-btn")) {
    b.classList.toggle("active", b.dataset.mode === currentMode);
  }
}

function bindZoneControls() {
  const z = () => currentZoneId;
  const seekTo = async (offsetMs) => {
    await api(`/api/zones/${z()}/playback/seek`, { method: "POST", json: { offsetMs: Math.max(0, Math.round(offsetMs)) } });
    refreshPlayback();
  };
  const curPos = async () => {
    const s = await api(`/api/zones/${z()}/snapshot`);
    return s.isPlaying && s.startServerTime ? s.trackOffsetMs + (s.serverTime - s.startServerTime) : s.trackOffsetMs;
  };
  $("btn-prev").onclick = async () => { await api(`/api/zones/${z()}/playback/prev`, { method: "POST" }); refreshPlayback(); };
  $("btn-back").onclick = async () => seekTo((await curPos()) - 10000);
  $("btn-pause").onclick = async () => { await api(`/api/zones/${z()}/playback/pause`, { method: "POST" }); refreshPlayback(); };
  $("btn-resume").onclick = async () => { await api(`/api/zones/${z()}/playback/resume`, { method: "POST" }); refreshPlayback(); };
  $("btn-next").onclick = async () => { await api(`/api/zones/${z()}/playback/next`, { method: "POST" }); refreshPlayback(); };
  $("btn-fwd").onclick = async () => seekTo((await curPos()) + 10000);
  $("btn-stop").onclick = async () => { await api(`/api/zones/${z()}/playback/stop`, { method: "POST" }); refreshPlayback(); };
  $("clear-queue").onclick = async () => { await api(`/api/zones/${z()}/queue/clear`, { method: "POST" }); refreshPlayback(); };

  const seekBar = $("seek-bar");
  seekBar.oninput = () => {
    seekDragging = true;
    $("now-pos").textContent = fmtTime(Number(seekBar.value));
  };
  seekBar.onchange = async () => {
    const v = Number(seekBar.value);
    seekDragging = false;
    await seekTo(v);
  };
}

// === Playlists ===
async function refreshPlaylists() {
  const r = await api("/api/playlists");
  playlists = r.playlists;
}

function renderPlaylistsList() {
  const wrap = $("playlists-list");
  wrap.innerHTML = "";
  if (playlists.length === 0) {
    wrap.innerHTML = '<div class="playlist-tracks-empty">还没有歌单，创建一个吧</div>';
    return;
  }
  for (const p of playlists) {
    const row = document.createElement("div");
    row.className = "playlist-row";
    row.innerHTML = `
      <div class="playlist-row-main">
        <div class="playlist-row-title"></div>
        <div class="playlist-row-sub">${p.trackCount} 首</div>
      </div>
      <div class="playlist-row-actions">
        <button class="icon-btn" data-act="rename" aria-label="改名" title="改名">✎</button>
        <button class="icon-btn danger" data-act="del" aria-label="删除" title="删除">✕</button>
      </div>`;
    row.querySelector(".playlist-row-title").textContent = p.name;
    row.onclick = (ev) => {
      if (ev.target.closest(".icon-btn")) return;
      openPlaylistDetail(p.id);
    };
    row.querySelector('[data-act="rename"]').onclick = async () => {
      const name = prompt("新歌单名", p.name);
      if (!name) return;
      try { await api(`/api/playlists/${p.id}`, { method: "PATCH", json: { name } }); }
      catch (e) { $("playlists-err").textContent = e.message; return; }
      await refreshPlaylists();
      renderPlaylistsList();
    };
    row.querySelector('[data-act="del"]').onclick = async () => {
      if (!confirm(`删除歌单「${p.name}」？此操作不会删除曲目本身。`)) return;
      try { await api(`/api/playlists/${p.id}`, { method: "DELETE" }); }
      catch (e) { $("playlists-err").textContent = e.message; return; }
      await refreshPlaylists();
      renderPlaylistsList();
    };
    wrap.appendChild(row);
  }
}

async function openPlaylistDetail(playlistId) {
  $("playlists-list-view").hidden = true;
  $("playlists-detail-view").hidden = false;
  const r = await api(`/api/playlists/${playlistId}/tracks`);
  const p = r.playlist;
  const tracks = r.tracks;
  $("pl-detail-name").textContent = p.name;
  $("pl-detail-sub").textContent = `${tracks.length} 首 · #${p.id}`;
  const wrap = $("pl-tracks-list");
  wrap.innerHTML = "";
  if (tracks.length === 0) {
    wrap.innerHTML = '<div class="playlist-tracks-empty">歌单为空</div>';
  } else {
    for (const t of tracks) {
      const row = document.createElement("div");
      row.className = "playlist-track-row";
      row.innerHTML = `
        <span class="track-name"></span>
        <span class="track-meta">${Math.round(t.duration_ms / 1000)}s</span>
        <button class="icon-btn danger" data-act="remove" aria-label="从歌单移除" title="从歌单移除">✕</button>`;
      row.querySelector(".track-name").textContent = t.title || t.id;
      row.querySelector('[data-act="remove"]').onclick = async () => {
        await api(`/api/playlists/${p.id}/tracks/${t.id}`, { method: "DELETE" });
        openPlaylistDetail(p.id);
        await refreshPlaylists();
      };
      wrap.appendChild(row);
    }
  }
  $("pl-load-btn").onclick = async () => {
    if (!currentZoneId) return;
    try {
      await api(`/api/zones/${currentZoneId}/queue/load-playlist`, {
        method: "POST", json: { playlistId: p.id }
      });
      $("playlists-detail-view").hidden = true;
      $("playlists-list-view").hidden = false;
      renderPlaylistsList();
      await refreshPlayback();
      flashUploadStatus(`✓ 已载入队列`);
    } catch (e) { $("playlists-err").textContent = e.message; }
  };
  $("pl-back-btn").onclick = () => {
    $("playlists-detail-view").hidden = true;
    $("playlists-list-view").hidden = false;
    renderPlaylistsList();
  };
}

// === Add-to-playlist picker ===
let pickerTargetTrackId = null;

function openAddToPlaylistPicker(trackId) {
  pickerTargetTrackId = trackId;
  $("picker-err").textContent = "";
  $("picker-new-name").value = "";
  renderPickerList();
  $("picker-modal").hidden = false;
}
function closePickerModal() {
  $("picker-modal").hidden = true;
  pickerTargetTrackId = null;
}

function renderPickerList() {
  const wrap = $("picker-list");
  wrap.innerHTML = "";
  if (playlists.length === 0) {
    wrap.innerHTML = '<div class="playlist-tracks-empty">还没有歌单，先在下面建一个</div>';
    return;
  }
  for (const p of playlists) {
    const row = document.createElement("div");
    row.className = "picker-row";
    row.innerHTML = `
      <div>
        <div class="picker-title"></div>
        <div class="picker-sub">${p.trackCount} 首</div>
      </div>
      <span class="picker-plus">+</span>`;
    row.querySelector(".picker-title").textContent = p.name;
    row.onclick = async () => {
      try {
        await api(`/api/playlists/${p.id}/tracks`, { method: "POST", json: { trackIds: [pickerTargetTrackId] } });
        closePickerModal();
        await refreshPlaylists();
        flashUploadStatus(`✓ 已加入「${p.name}」`);
      } catch (e) { $("picker-err").textContent = e.message; }
    };
    wrap.appendChild(row);
  }
}

function flashUploadStatus(text) {
  const el = $("upload-status");
  if (!el) return;
  el.textContent = text;
  setTimeout(() => { if (el.textContent === text) el.textContent = ""; }, 2500);
}

// === Track edit modal ===
let editingTrackId = null;

function openTrackEdit(trackId) {
  const t = tracks.find((x) => x.id === trackId);
  if (!t) return;
  editingTrackId = trackId;
  $("track-edit-err").textContent = "";
  $("track-edit-title").value = t.title || "";
  $("track-edit-artist").value = t.artist || "";
  $("track-edit-meta").textContent = `时长 ${Math.round(t.duration_ms / 1000)}s · ${(t.size_bytes / 1024 / 1024).toFixed(1)} MB`;
  $("track-edit-modal").hidden = false;
  setTimeout(() => $("track-edit-title").focus(), 30);
}

function closeTrackEdit() {
  $("track-edit-modal").hidden = true;
  $("track-edit-err").textContent = "";
  editingTrackId = null;
}

async function saveTrackEdit(ev) {
  ev.preventDefault();
  if (!editingTrackId) return;
  const title = $("track-edit-title").value.trim();
  const artist = $("track-edit-artist").value.trim();
  if (!title) { $("track-edit-err").textContent = "标题不能为空"; return; }
  try {
    await api(`/api/tracks/${editingTrackId}`, {
      method: "PATCH",
      json: { title, artist: artist || null },
    });
    closeTrackEdit();
    await refreshTracks();
    await refreshPlayback();
  } catch (e) {
    $("track-edit-err").textContent = e.message;
  }
}

// === Queue drag-and-drop reorder ===
let dragSrcId = null;

function bindQueueDrag() {
  const ql = $("queue-list");
  const items = ql.querySelectorAll(".queue-item");
  items.forEach((li) => {
    li.addEventListener("dragstart", (e) => {
      dragSrcId = li.dataset.trackId;
      li.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", dragSrcId);
    });
    li.addEventListener("dragend", () => {
      li.classList.remove("dragging");
      ql.querySelectorAll(".drop-target").forEach((el) => el.classList.remove("drop-target"));
      dragSrcId = null;
    });
    li.addEventListener("dragover", (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      ql.querySelectorAll(".drop-target").forEach((el) => el.classList.remove("drop-target"));
      li.classList.add("drop-target");
    });
    li.addEventListener("drop", async (e) => {
      e.preventDefault();
      const src = e.dataTransfer.getData("text/plain") || dragSrcId;
      const dst = li.dataset.trackId;
      if (!src || !dst || src === dst) return;
      const ids = [...ql.querySelectorAll(".queue-item")].map((el) => el.dataset.trackId);
      const srcIdx = ids.indexOf(src);
      const dstIdx = ids.indexOf(dst);
      if (srcIdx < 0 || dstIdx < 0) return;
      const arr = ids.slice();
      const [moved] = arr.splice(srcIdx, 1);
      arr.splice(dstIdx, 0, moved);
      try {
        await api(`/api/zones/${currentZoneId}/queue/replace`, {
          method: "POST",
          json: { trackIds: arr },
        });
        await refreshPlayback();
      } catch (err) { alert(err.message); }
    });
  });
}

function uploadFile(file) {
  const fd = new FormData();
  fd.append("file", file);
  const xhr = new XMLHttpRequest();
  xhr.open("POST", "/api/tracks");
  xhr.withCredentials = true;
  xhr.upload.onprogress = (ev) => {
    if (ev.lengthComputable) {
      const pct = (ev.loaded / ev.total) * 100;
      $("upload-progress").classList.add("active");
      $("upload-progress-fill").style.width = `${pct}%`;
      $("upload-status").textContent = `上传中：${file.name} — ${pct.toFixed(0)}%`;
    }
  };
  return new Promise((resolve, reject) => {
    xhr.onload = () => {
      $("upload-progress").classList.remove("active");
      $("upload-progress-fill").style.width = "0%";
      if (xhr.status >= 200 && xhr.status < 300) resolve(JSON.parse(xhr.responseText));
      else reject(new Error(`HTTP ${xhr.status}: ${xhr.responseText}`));
    };
    xhr.onerror = () => reject(new Error("网络错误"));
    xhr.send(fd);
  });
}

async function bootDashboard() {
  $("login-screen").hidden = true;
  $("dashboard").hidden = false;
  bindZoneControls();

  $("logout-btn").onclick = async () => { await api("/api/auth/logout", { method: "POST" }); location.reload(); };

  // 左上管理 tab
  for (const b of document.querySelectorAll(".manage-tabs .manage-tab")) {
    b.onclick = () => switchManageTab(b.dataset.mtab);
  }
  $("zone-add-btn").onclick = async () => {
    const name = prompt("新分区名称");
    if (!name) return;
    try {
      const r = await api("/api/zones", { method: "POST", json: { name } });
      await refreshZones();
      switchZone(r.zone.id);
    } catch (e) { alert(e.message); }
  };

  // 歌单创建
  $("playlist-create-form").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    const name = $("playlist-new-name").value.trim();
    if (!name) return;
    try {
      await api("/api/playlists", { method: "POST", json: { name } });
      $("playlist-new-name").value = "";
      await refreshPlaylists();
      renderPlaylistsList();
    } catch (e) { $("playlists-err").textContent = e.message; }
  });

  // 加入歌单 picker
  $("picker-close").onclick = closePickerModal;
  $("picker-modal").addEventListener("click", (e) => { if (e.target.id === "picker-modal") closePickerModal(); });
  $("picker-create-form").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    const name = $("picker-new-name").value.trim();
    if (!name || !pickerTargetTrackId) return;
    try {
      const r = await api("/api/playlists", { method: "POST", json: { name } });
      await api(`/api/playlists/${r.playlist.id}/tracks`, { method: "POST", json: { trackIds: [pickerTargetTrackId] } });
      closePickerModal();
      await refreshPlaylists();
      flashUploadStatus(`✓ 已加入「${name}」`);
    } catch (e) { $("picker-err").textContent = e.message; }
  });

  // 模式切换（顺序 / 单曲 / 随机 / 循环）
  for (const b of document.querySelectorAll("#mode-switch .mode-switch-btn")) {
    b.onclick = async () => {
      if (!currentZoneId) return;
      const mode = b.dataset.mode;
      try {
        await api(`/api/zones/${currentZoneId}/playback/mode`, { method: "PATCH", json: { mode } });
        currentMode = mode;
        renderModeSwitch();
        flashUploadStatus(`✓ 模式：${b.textContent.trim()}`);
      } catch (e) { alert(e.message); }
    };
  }
  renderModeSwitch();

  // 曲目编辑弹窗
  $("track-edit-close").onclick = closeTrackEdit;
  $("track-edit-cancel").onclick = closeTrackEdit;
  $("track-edit-modal").addEventListener("click", (e) => { if (e.target.id === "track-edit-modal") closeTrackEdit(); });
  $("track-edit-form").addEventListener("submit", saveTrackEdit);

  const uploadFileInput = $("upload-file");
  const uploadDrop = $("upload-drop");
  const handleFiles = async (files) => {
    if (!files || files.length === 0) return;
    for (const file of files) {
      try {
        $("upload-status").textContent = `上传中：${file.name}…`;
        await uploadFile(file);
        $("upload-status").textContent = `✓ ${file.name}`;
      } catch (e) {
        $("upload-status").textContent = `✗ ${file.name} — ${e.message}`;
      }
    }
    await refreshTracks();
    uploadFileInput.value = "";
  };
  uploadFileInput.addEventListener("change", (e) => handleFiles([...e.target.files]));
  ["dragenter", "dragover"].forEach((ev) =>
    uploadDrop.addEventListener(ev, (e) => { e.preventDefault(); uploadDrop.classList.add("dragover"); })
  );
  ["dragleave", "drop"].forEach((ev) =>
    uploadDrop.addEventListener(ev, (e) => { e.preventDefault(); uploadDrop.classList.remove("dragover"); })
  );
  uploadDrop.addEventListener("drop", (e) => handleFiles([...e.dataTransfer.files]));

  await refreshTracks();
  await refreshZones();
  await refreshPlaylists();
  refreshZoneDevices();
  setInterval(async () => {
    try { await refreshPlayback(); } catch (e) { console.warn("refreshPlayback:", e.message); }
    try { if (!volumeDragging) await refreshZoneDevices(); } catch (e) { console.warn("refreshZoneDevices:", e.message); }
  }, 2000);
}

(async () => {
  try {
    const me = await api("/api/auth/me");
    if (me.authenticated) { $("who").textContent = me.username ?? ""; bootDashboard(); return; }
  } catch (e) {
    console.warn("检查登录状态失败：", e);
  }
  $("login-form").addEventListener("submit", async (ev) => {
    ev.preventDefault();
    const u = $("username").value.trim(), p = $("password").value;
    if (!u || !p) { $("login-err").textContent = "用户名和密码必填"; return; }
    try {
      await api("/api/auth/login", { method: "POST", json: { username: u, password: p } });
      $("who").textContent = u;
      bootDashboard();
    } catch (e) { $("login-err").textContent = e?.message ?? "登录失败"; }
  });
})();
</script>
