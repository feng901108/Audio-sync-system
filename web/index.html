<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>聚光广播</title>
<link rel="stylesheet" href="/styles.css" />
</head>
<body class="player-page">
  <main class="player-shell">

    <!-- join phase -->
    <section id="join" class="join">
      <div class="join-brand">聚光广播 · Juguang</div>
      <h1 class="join-title">
        加入<span class="accent">广播</span><br />
        实时同步。
      </h1>
      <p class="join-sub">
        一处选歌，所有设备严格同步播放。<br />
        请保持页面前台运行。
      </p>

      <div id="server-info" class="server-info" hidden></div>

      <div class="field">
        <input id="device-name" class="input" placeholder="给这台设备起个名字" />
      </div>
      <div class="field">
        <select id="zone-select" class="select" aria-label="选择分区"></select>
      </div>

      <button id="join-btn" class="btn btn-primary" style="height:52px;font-size:15px;">
        加入广播
      </button>
    </section>

    <!-- playing phase -->
    <section id="player" hidden>
      <div class="now-playing">
        <div class="now-playing-art">
          <span class="now-playing-art-icon" aria-hidden="true">♪</span>
        </div>
        <h2 class="now-playing-title" id="title">等待广播…</h2>
        <div class="now-playing-empty" id="empty-hint" hidden>请管理员选择曲目</div>
        <div style="margin-top:var(--sp-3);">
          <span class="zone-tag" id="zone-tag"></span>
        </div>
      </div>

      <div class="progress">
        <span class="progress-time" id="position">0:00</span>
        <div class="progress-track">
          <div class="progress-fill" id="bar-fill"></div>
        </div>
        <span class="progress-time" id="duration">0:00</span>
      </div>

      <div class="meta">
        <div class="meta-item">
          <span class="meta-label">设备</span>
          <span class="meta-value muted" id="device-label">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">IP</span>
          <span class="meta-value muted" id="device-ip">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">时钟差</span>
          <span class="meta-value" id="offset">0 ms</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">偏差</span>
          <span class="meta-value" id="drift">0 ms</span>
        </div>
        <div class="meta-item" style="grid-column:span 2;">
          <span class="meta-label">RTT</span>
          <span class="meta-value" id="rtt">0 ms</span>
        </div>
      </div>

      <div class="volume">
        <span class="volume-label">音量</span>
        <input id="vol" type="range" min="0" max="1" step="0.01" value="1" aria-label="音量" />
      </div>

      <div class="status">
        <span class="status-dot" id="conn-dot"></span>
        <span id="conn-status">连接中…</span>
      </div>
    </section>

  </main>

<script type="module">
import { SyncClient } from "/sync.js";

const $ = (id) => document.getElementById(id);

const fmt = (ms) => {
  const s = Math.max(0, Math.floor(ms / 1000));
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
};

// 保存的名字
const savedName = localStorage.getItem("juguang.deviceName") ?? "";
$("device-name").value = savedName || `Web-${Math.random().toString(36).slice(2, 6)}`;

async function loadZones() {
  let zones = [];
  try {
    const r = await fetch("/api/zones");
    const j = await r.json();
    zones = j.zones || [];
  } catch {}
  const sel = $("zone-select");
  sel.innerHTML = "";
  if (zones.length === 0) {
    const opt = document.createElement("option");
    opt.value = "1"; opt.textContent = "默认分区";
    sel.appendChild(opt);
  } else {
    for (const z of zones) {
      const opt = document.createElement("option");
      opt.value = String(z.id);
      opt.textContent = z.name;
      sel.appendChild(opt);
    }
  }
  const saved = Number(localStorage.getItem("juguang.zoneId") ?? 1);
  sel.value = String(zones.find((z) => z.id === saved) ? saved : (zones[0]?.id ?? 1));
}

async function loadServerInfo() {
  try {
    const r = await fetch("/api/health");
    const h = await r.json();
    if (h.serverIps?.length) {
      const el = $("server-info");
      el.hidden = false;
      el.innerHTML =
        `<div style="margin-bottom:6px;">同一网络下的设备可访问：</div>` +
        h.serverIps.map((ip) => `<code>http://${ip.address}:${h.port}</code>`).join(" ");
    }
  } catch {}
}

let currentZoneName = "";
let deviceIp = "";

$("join-btn").addEventListener("click", async () => {
  const name = $("device-name").value.trim() || "Web";
  const zoneId = Number($("zone-select").value) || 1;
  currentZoneName = $("zone-select").selectedOptions[0]?.textContent ?? "";
  localStorage.setItem("juguang.deviceName", name);
  localStorage.setItem("juguang.zoneId", String(zoneId));
  const client = new SyncClient(name, "web", zoneId);
  await client.connect();
  $("join").hidden = true;
  $("player").hidden = false;
  $("zone-tag").textContent = currentZoneName;
  $("vol").addEventListener("input", () => client.setLocalVolume(Number($("vol").value)));
  client.on((s) => {
    $("title").textContent = s.trackTitle ?? "";
    $("empty-hint").hidden = !!s.trackTitle || !s.isPlaying;
    $("title").hidden = !s.trackTitle;
    $("position").textContent = fmt(s.positionMs);
    $("duration").textContent = fmt(s.durationMs);
    const pct = s.durationMs > 0 ? (s.positionMs / s.durationMs) * 100 : 0;
    const fill = $("bar-fill");
    fill.style.width = `${pct}%`;
    fill.classList.toggle("playing", !!s.isPlaying);
    $("device-label").textContent = s.deviceId ? `${name} · ${s.deviceId.slice(0, 6)}` : name;
    if (s.ip && s.ip !== deviceIp) { deviceIp = s.ip; $("device-ip").textContent = deviceIp; }
    $("drift").textContent = `${s.driftMs} ms`;
    $("drift").classList.toggle("muted", Math.abs(s.driftMs) < 50);
    $("rtt").textContent = `${s.rttMs} ms`;
    $("offset").textContent = `${s.clockOffsetMs} ms`;
    const ok = s.connected;
    $("conn-status").textContent = ok ? "已连接" : "已断开，正在重连…";
    $("conn-dot").className = "status-dot " + (ok ? "ok" : "warn");
  });
  if ("wakeLock" in navigator) { try { await navigator.wakeLock.request("screen"); } catch {} }
});

loadServerInfo();
loadZones();
</script>
</body>
</html>
